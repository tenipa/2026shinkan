<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - 東京大学スポーツ愛好会 硬式テニスパート</title>
    <link rel="stylesheet" href="styles.css"> <script defer src="script.js"></script> </head>
<body>
    <div id="header-placeholder"></div>

    <div id="faq-page-content">
        <section class="section">
        <h2>よくある質問 (FAQ)</h2>
        <div class="faq-container">
            <div class="faq-item">
                <h3 class="faq-question">Q. テニス未経験でも大丈夫？</h3>
                <p class="faq-answer">A. 全く問題ないです！テニパは初心者から経験者まで幅広く在籍しており、初心者練習会というイベントも実施するため、歴に関係なくこぞって入サーしてください！</p>
            </div>
            <div class="faq-item">
                <h3 class="faq-question">Q. 練習や合宿の参加にノルマはあるの？</h3>
                <p class="faq-answer">A. ありません！練習や合宿は完全に自由参加で、自分のペースで活動が行えます！</p>
            </div>
            <div class="faq-item">
                <h3 class="faq-question">Q. 兼サーはできる？</h3>
                <p class="faq-answer">A. もちろん可能です！運動系から文化系まで、様々なサークルと兼サーしているメンバーがたくさん在籍しています！</p>
            </div>
            <div class="faq-item">
                <h3 class="faq-question">Q. 飲みの強要はありますか？</h3>
                <p class="faq-answer">A. 絶対にありません！</p>
            </div>
            
        
        <div style="text-align: center; margin-top: 30px;">

        </section>
